<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Меню для нас 🍓</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Nunito:wght@400;600;700;800&family=Playfair+Display:ital,wght@0,600;0,700;1,500;1,600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FAFAFA;
    --card:#FFFFFF;
    --ink:#262220;
    --muted:#8C857C;
    --red:#E60023;
    --red-soft:#FFE3E8;
    --pink:#FCE4E8;
    --yellow:#FFF3D6;
    --mint:#E2F3EA;
    --lavender:#EFE6F8;
    --peach:#FDE9DC;
    --green-text:#3A5A45;
    --shadow: 0 8px 20px rgba(38,34,32,0.08);
    --shadow-hover: 0 14px 28px rgba(38,34,32,0.14);
  }

  *{box-sizing:border-box;}

  body{
    margin:0;
    color:var(--ink);
    font-family:'Nunito', sans-serif;
    background: var(--bg);
    min-height:100vh;
  }

  .page{
    max-width: 820px;
    margin: 0 auto;
    padding: 32px 20px 80px;
  }

  /* ---------- Hero ---------- */
  .hero{ text-align:center; padding: 8px 0 24px; opacity:0; animation: rise 0.7s ease-out 0.1s forwards; }
  .hero-note{
    font-family:'Caveat', cursive;
    font-size: 1.6rem;
    color: var(--red);
    margin: 0 0 6px;
    transform: rotate(-1.2deg);
  }
  .hero-title{
    font-family:'Playfair Display', serif;
    font-style: italic;
    font-weight: 700;
    font-size: clamp(2.2rem, 6vw, 3.2rem);
    margin: 0 0 8px;
    color: var(--ink);
  }
  .hero-sub{
    color: var(--muted);
    font-size: 1.02rem;
    margin: 0;
  }

  @keyframes rise{ from{ opacity:0; transform: translateY(10px);} to{ opacity:1; transform: translateY(0);} }

  /* ---------- Day tabs ---------- */
  .day-tabs{
    display:flex;
    gap: 10px;
    justify-content:center;
    margin: 28px 0 24px;
    flex-wrap: wrap;
  }
  .day-tab{
    font-family:'Nunito', sans-serif;
    font-weight:800;
    font-size: 0.95rem;
    color: var(--muted);
    background: var(--card);
    border: none;
    padding: 12px 26px;
    border-radius: 999px;
    cursor:pointer;
    box-shadow: var(--shadow);
    transition: box-shadow 0.2s ease, color 0.2s ease, background 0.2s ease, transform 0.15s ease;
  }
  .day-tab:hover{ transform: translateY(-2px); box-shadow: var(--shadow-hover); }
  .day-tab.active{
    color: #fff;
    background: var(--red);
  }

  /* ---------- Day panel ---------- */
  .day-panel{
    background: transparent;
  }

  .section-label{
    font-family:'Playfair Display', serif;
    font-style: italic;
    font-weight: 600;
    font-size: 1.3rem;
    margin: 0 0 16px;
    color: var(--ink);
  }
  .section-label.second{ margin-top: 36px; }
  .section-hint{
    font-size: 0.85rem;
    color: var(--muted);
    margin: -10px 0 16px;
  }

  .pin-grid{
    list-style:none; margin:0; padding:0;
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
    gap: 14px;
  }

  .pin-card{
    position: relative;
    border-radius: 22px;
    padding: 18px 16px;
    cursor:pointer;
    box-shadow: var(--shadow);
    transition: box-shadow 0.2s ease, transform 0.18s ease, outline 0.15s ease;
    outline: 3px solid transparent;
    display:flex; flex-direction:column; justify-content:center;
  }
  .pin-card:hover{ transform: translateY(-3px); box-shadow: var(--shadow-hover); }
  .pin-card input{ position:absolute; opacity:0; pointer-events:none; }
  .pin-card .pin-emoji{ font-size: 1.8rem; display:block; margin-bottom: 8px; }
  .pin-card strong{ display:block; font-size: 0.98rem; line-height:1.35; }

  .pin-card.checked{ outline-color: var(--red); }
  .pin-card.checked::after{
    content:"✓";
    position:absolute; top:10px; right:10px;
    width:22px; height:22px;
    background: var(--red);
    color:#fff;
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size: 0.75rem;
    font-weight:800;
  }

  .pin-card.c1{ background: var(--pink); }
  .pin-card.c2{ background: var(--yellow); }
  .pin-card.c3{ background: var(--mint); }
  .pin-card.c4{ background: var(--lavender); }
  .pin-card.c5{ background: var(--peach); }

  .kombucha-note{
    margin: 16px 0 0;
    padding: 12px 16px;
    background: var(--card);
    border-radius: 14px;
    font-size: 0.88rem;
    color: var(--ink);
    font-weight: 700;
    box-shadow: var(--shadow);
    display:inline-block;
  }

  /* ---------- Summary ---------- */
  .summary{
    margin-top: 44px;
    background: var(--card);
    border-radius: 22px;
    padding: 28px 26px;
    box-shadow: var(--shadow);
  }
  .summary-header{
    display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px;
    margin-bottom: 6px;
  }
  .summary h2{
    font-family:'Playfair Display', serif;
    font-style: italic;
    font-size: 1.4rem;
    margin: 0;
  }
  .summary-buttons{ display:flex; gap:10px; flex-wrap:wrap; }
  #saveBtn, #resetBtn{
    font-family:'Nunito', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    border:none;
    padding: 9px 18px;
    border-radius: 999px;
    cursor:pointer;
    transition: background 0.18s ease, transform 0.15s ease;
  }
  #saveBtn{ color:#fff; background: var(--red); }
  #saveBtn:hover{ background:#C2001D; transform: translateY(-1px); }
  #resetBtn{ color: var(--red); background: var(--red-soft); }
  #resetBtn:hover{ background: #FFD2DA; transform: translateY(-1px); }

  .save-status{
    font-size: 0.85rem;
    color: var(--muted);
    margin: 0 0 18px;
    min-height: 1.2em;
  }
  .save-status.unsaved{ color: var(--red); font-weight:700; }
  .save-status.saved{ color: var(--green-text); font-weight:700; }

  .summary-day{
    font-size: 0.95rem;
    padding: 12px 0;
    border-bottom: 1px solid #F0EEEA;
  }
  .summary-day:last-of-type{ border-bottom:none; }
  .summary-day b{ color: var(--red); }
  .summary-tags{ margin-top: 6px; display:flex; flex-wrap:wrap; gap:6px; }
  .summary-tag{
    background: var(--red-soft);
    color: var(--red);
    font-size: 0.8rem;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 999px;
  }
  .summary-tag.act{ background: var(--mint); color: var(--green-text); }
  .summary-empty{ color: var(--muted); font-style: italic; font-size: 0.92rem; }

  footer{
    text-align:center;
    margin-top: 40px;
    font-family:'Caveat', cursive;
    font-size: 1.25rem;
    color: var(--muted);
  }

  @media (max-width: 480px){
    .day-tab{ padding: 10px 18px; font-size: 0.85rem; }
    .pin-grid{ grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
  }

  @media (prefers-reduced-motion: reduce){
    .hero{ animation:none; opacity:1; }
    .day-tab, .pin-card{ transition:none; }
  }
</style>
</head>
<body>
<div class="page">

  <header class="hero">
    <p class="hero-note">від Ангелінки для Олексійчика 🤍</p>
    <h1 class="hero-title">Меню для нас</h1>
    <p class="hero-sub">Обери, що їмо і що робимо разом — день за днем</p>
  </header>

  <nav class="day-tabs" id="dayTabs"></nav>
  <main id="dayPanels"></main>

  <section class="summary">
    <div class="summary-header">
      <h2>Наш план</h2>
      <div class="summary-buttons">
        <button id="saveBtn">Запам'ятати вибір</button>
        <button id="resetBtn">Скинути вибір</button>
      </div>
    </div>
    <p class="save-status" id="saveStatus"></p>
    <div id="summaryContent"></div>
  </section>

  <footer>з любов'ю до зустрічі 🍓</footer>
</div>

<script>
  const DAYS = [1, 2, 3];

  const DISHES = [
    { id: 'borsch', emoji: '🍲', name: 'Борщ з пампушками', c: 'c1' },
    { id: 'okroshka', emoji: '🥣', name: 'Окрошка', c: 'c2' },
    { id: 'makdonis', emoji: '🧀', name: 'Макдоніс', c: 'c3' },
    { id: 'kebab', emoji: '🌯', name: 'Кебаб або Гірос', c: 'c4' },
    { id: 'caprese', emoji: '🍅', name: 'Капрезе з маринованими томатами та зеленою олією', c: 'c5' },
  ];

  const ACTIVITIES = [
    { id: 'park', emoji: '☕', name: 'На світаночку піти разом пити каву і читати книжки в парк' },
    { id: 'starwars', emoji: '✨', name: 'Разом пограти в Зоряні Війни' },
    { id: 'movie', emoji: '🎬', name: 'Подивитись разом Точку Збору' },
    { id: 'witcher', emoji: '🗡️', name: 'Пограти у Відьмака' },
    { id: 'gym', emoji: '🏋️', name: 'Піти у спортзал' },
    { id: 'dinner', emoji: '🍽️', name: 'Повечеряти у гарному місці' },
  ];

  const STORAGE_KEY = 'menu-plan-v3';

  function freshState(){
    const initial = {};
    DAYS.forEach(d => { initial[d] = { dishes: [], activities: [] }; });
    return initial;
  }

  function loadCommitted(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    }catch(e){}
    return freshState();
  }

  function persist(){
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(committed)); }catch(e){}
  }

  let committed = loadCommitted();
  let draft = JSON.parse(JSON.stringify(committed));
  let activeDay = DAYS[0];

  function isDirty(){
    return JSON.stringify(draft) !== JSON.stringify(committed);
  }

  function buildTabs(){
    const nav = document.getElementById('dayTabs');
    nav.innerHTML = '';
    DAYS.forEach(d => {
      const btn = document.createElement('button');
      btn.className = 'day-tab' + (d === activeDay ? ' active' : '');
      btn.textContent = 'День ' + d;
      btn.addEventListener('click', () => { activeDay = d; render(); });
      nav.appendChild(btn);
    });
  }

  function toggle(arr, id){
    const idx = arr.indexOf(id);
    if (idx > -1) arr.splice(idx, 1);
    else arr.push(id);
  }

  function buildPanels(){
    const main = document.getElementById('dayPanels');
    main.innerHTML = '';
    DAYS.forEach(d => {
      if (d !== activeDay) return;
      const panel = document.createElement('section');
      panel.className = 'day-panel';

      const dishLabel = document.createElement('p');
      dishLabel.className = 'section-label';
      dishLabel.textContent = 'Що їмо сьогодні?';
      panel.appendChild(dishLabel);

      const dishHint = document.createElement('p');
      dishHint.className = 'section-hint';
      dishHint.textContent = 'можна обрати кілька страв';
      panel.appendChild(dishHint);

      const dishGrid = document.createElement('ul');
      dishGrid.className = 'pin-grid';
      DISHES.forEach(dish => {
        const li = document.createElement('li');
        const isChecked = draft[d].dishes.includes(dish.id);
        li.className = 'pin-card ' + dish.c + (isChecked ? ' checked' : '');
        li.innerHTML = `
          <input type="checkbox" ${isChecked ? 'checked' : ''}>
          <span class="pin-emoji">${dish.emoji}</span>
          <strong>${dish.name}</strong>
        `;
        li.addEventListener('click', () => {
          toggle(draft[d].dishes, dish.id);
          render();
        });
        dishGrid.appendChild(li);
      });
      panel.appendChild(dishGrid);

      const kombucha = document.createElement('p');
      kombucha.className = 'kombucha-note';
      kombucha.textContent = '🍓 + Комбуча домашня полунична — завжди в холодильнику';
      panel.appendChild(kombucha);

      const actLabel = document.createElement('p');
      actLabel.className = 'section-label second';
      actLabel.textContent = 'Що робимо разом?';
      panel.appendChild(actLabel);

      const actGrid = document.createElement('ul');
      actGrid.className = 'pin-grid';
      ACTIVITIES.forEach((act, i) => {
        const li = document.createElement('li');
        const isChecked = draft[d].activities.includes(act.id);
        const colorClass = 'c' + ((i % 5) + 1);
        li.className = 'pin-card ' + colorClass + (isChecked ? ' checked' : '');
        li.innerHTML = `
          <input type="checkbox" ${isChecked ? 'checked' : ''}>
          <span class="pin-emoji">${act.emoji}</span>
          <strong>${act.name}</strong>
        `;
        li.addEventListener('click', () => {
          toggle(draft[d].activities, act.id);
          render();
        });
        actGrid.appendChild(li);
      });
      panel.appendChild(actGrid);

      main.appendChild(panel);
    });
  }

  function buildSummary(){
    const box = document.getElementById('summaryContent');
    box.innerHTML = '';
    let anything = false;
    DAYS.forEach(d => {
      const dishObjs = committed[d].dishes.map(id => DISHES.find(x => x.id === id)).filter(Boolean);
      const actObjs = committed[d].activities.map(id => ACTIVITIES.find(a => a.id === id)).filter(Boolean);
      if (!dishObjs.length && !actObjs.length) return;
      anything = true;
      const row = document.createElement('div');
      row.className = 'summary-day';
      let tagsHtml = '<div class="summary-tags">';
      dishObjs.forEach(dishO => tagsHtml += `<span class="summary-tag">${dishO.emoji} ${dishO.name}</span>`);
      actObjs.forEach(actO => tagsHtml += `<span class="summary-tag act">${actO.emoji} ${actO.name}</span>`);
      tagsHtml += '</div>';
      row.innerHTML = `<b>День ${d}</b>${tagsHtml}`;
      box.appendChild(row);
    });
    if (!anything){
      box.innerHTML = '<p class="summary-empty">Поки нічого не запам\'ятано — обери варіанти і натисни «Запам\'ятати вибір» 👆</p>';
    }
  }

  function buildSaveStatus(){
    const status = document.getElementById('saveStatus');
    if (isDirty()){
      status.textContent = 'Є нові позначки — натисни «Запам\'ятати вибір», щоб зафіксувати';
      status.className = 'save-status unsaved';
    } else {
      status.textContent = 'Збережено ✓';
      status.className = 'save-status saved';
    }
  }

  function render(){
    buildTabs();
    buildPanels();
    buildSummary();
    buildSaveStatus();
  }

  document.getElementById('saveBtn').addEventListener('click', () => {
    committed = JSON.parse(JSON.stringify(draft));
    persist();
    render();
  });

  document.getElementById('resetBtn').addEventListener('click', () => {
    if (confirm('Точно скинути весь вибір?')){
      draft = freshState();
      committed = freshState();
      persist();
      render();
    }
  });

  render();
</script>
</body>
</html>
